version: "3.8"

services:

  proxy:
    image: nginx:alpine
    container_name: proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
    networks:
      - frontend
      - backend

  backend1:
    image: nginx:alpine
    container_name: backend1
    volumes:
      - webdata:/usr/share/nginx/html:ro
    networks:
      - backend

  backend2:
    image: nginx:alpine
    container_name: backend2
    volumes:
      - webdata:/usr/share/nginx/html:ro
    networks:
      - backend

volumes:
  webdata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./web

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
